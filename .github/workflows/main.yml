name: Main Workflow
on: workflow_dispatch
jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v2

      - name: Set up Docker
        uses: docker/setup-buildx-action@v2

      - name: Pull Docker image
        run: docker pull coherentsolutions/rest-training:2.0

      - name: Run Docker container
        run: docker run -d -p 5050:8082 coherentsolutions/rest-training:2.0

      - name: Wait for the container to be ready
        run: sleep 30

      - name: Set up .NET SDK
        uses: actions/setup-dotnet@v3
        with:
          dotnet-version: '9.0'
          
      - name: Restore NuGet packages
        run: dotnet restore RestApiCSharp2.sln

      - name: Build the project
        run: dotnet build RestApiCSharp2.sln --configuration Release

        # ✅ Run tests and generate Allure results
      - name: Run tests
        run: dotnet test RestApiCSharp2.sln --configuration Release --logger "trx" --results-directory ./allure-results
        continue-on-error: true

      # ✅ Install Allure
      - name: Install Allure
        run: |
          sudo apt-add-repository ppa:qameta/allure
          sudo apt-get update
          sudo apt-get install allure -y

      # ✅ Generate Allure report
      - name: Generate Allure Report
        run: |
          allure generate ./allure-results --clean -o ./allure-report

      # ✅ Upload report as artifact
      - name: Upload Allure Report
        uses: actions/upload-artifact@v3
        with:
          name: allure-report
          path: ./allure-report

      - name: Run tests
        run: dotnet test RestApiCSharp2.sln --configuration Release 
        continue-on-error: true  
