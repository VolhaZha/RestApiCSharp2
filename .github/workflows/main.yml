name: Main Workflow
on: workflow_dispatch
permissions:
  pull-requests: write
  checks: write
jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v2

      - name: Set up Docker
        uses: docker/setup-buildx-action@v2

      - name: Pull Docker image
        run: docker pull coherentsolutions/rest-training:2.0

      - name: Run Docker container
        run: docker run -d -p 5050:8082 coherentsolutions/rest-training:2.0

      - name: Wait for the container to be ready
        run: sleep 30

      - name: Set up .NET SDK
        uses: actions/setup-dotnet@v3
        with:
          dotnet-version: '9.0'
          
      - name: Restore NuGet packages
        run: dotnet restore RestApiCSharp2.sln

      - name: Build the project
        run: dotnet build RestApiCSharp2.sln --configuration Release

      - name: Run tests
        run: dotnet test RestApiCSharp2.sln --configuration Release 
        continue-on-error: true  

      # Install Allure Commandline
      - name: Install Allure Commandline
        run: |
          curl -o allure-2.14.0.tgz -L https://github.com/allure-framework/allure2/releases/download/2.14.0/allure-2.14.0.tgz
          tar -zxvf allure-2.14.0.tgz
          sudo mv allure-2.14.0/bin/allure /usr/local/bin

      # Generate Allure report from test results
      - name: Generate Allure report
        run: allure generate --clean -o allure-report

      # Upload the Allure report as an artifact
      - name: Upload Allure report as artifact
        uses: actions/upload-artifact@v2
        with:
          name: allure-report
          path: allure-report
