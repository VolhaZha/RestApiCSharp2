name: Main Workflow
on: workflow_dispatch
jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v2

      - name: Set up Docker
        uses: docker/setup-buildx-action@v2

      - name: Pull Docker image
        run: docker pull coherentsolutions/rest-training:2.0

      - name: Run Docker container
        run: docker run -d -p 5050:8082 coherentsolutions/rest-training:2.0

      - name: Wait for the container to be ready
        run: sleep 30

      - name: Set up .NET SDK
        uses: actions/setup-dotnet@v3
        with:
          dotnet-version: '9.0'
          
      - name: Restore NuGet packages
        run: dotnet restore RestApiCSharp2.sln

      - name: Build the project
        run: dotnet build RestApiCSharp2.sln --configuration Release

      - name: Run tests
        run: dotnet test RestApiCSharp2.sln --configuration Release
        continue-on-error: true
        env:
          ALLURE_RESULTS_DIRECTORY: allure-results

      - name: Set up Java for Allure CLI
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Install Allure CLI
        run: |
          ALLURE_VERSION=2.27.0
          wget https://github.com/allure-framework/allure2/releases/download/${ALLURE_VERSION}/allure-${ALLURE_VERSION}.tgz
          tar -zxvf allure-${ALLURE_VERSION}.tgz
          sudo mv allure-${ALLURE_VERSION} /opt/allure
          sudo ln -s /opt/allure/bin/allure /usr/bin/allure
          allure --version

      - name: Find allure-results directory
        if: always()
        id: find_allure
        shell: bash
        run: |
          echo "🔍 Searching for allure-results folder..."
          FOUND_PATH=$(find . -type d -name "allure-results" | head -n 1)
          if [ -n "$FOUND_PATH" ]; then
            echo "✅ Found allure-results at: $FOUND_PATH"
            ls -la "$FOUND_PATH"
            echo "path=$FOUND_PATH" >> $GITHUB_OUTPUT
          else
            echo "❌ allure-results folder not found."
            exit 1
          fi

      - name: Generate Allure report
        if: always()
        shell: bash
        run: |
          allure generate "${{ steps.find_allure.outputs.path }}" -o allure-report --clean
          echo "📄 Allure report generated:"
          ls -la allure-report

      - name: Upload Allure results (raw)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results
          path: ${{ steps.find_allure.outputs.path }}
          if-no-files-found: warn
          retention-days: 14

      - name: Upload Allure report (HTML)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-report
          path: allure-report
          if-no-files-found: warn
          retention-days: 14
